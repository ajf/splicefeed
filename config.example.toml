# splicefeed configuration
# Default location: ~/.config/splicefeed/config.toml
# Override with --config or the SPLICEFEED_CONFIG env var.

# Address the HTTP server binds to. Loopback by default — exposing this
# beyond localhost (e.g. "0.0.0.0:8380") is your explicit choice.
#bind = "127.0.0.1:8380"

# Base URL written into feed enclosure/artwork URLs. Set this to how your
# podcast app reaches the daemon; defaults to http://<bind>.
#external_base_url = "http://nas.lan:8380"

# Where SQLite state, audio, artwork, and the parse quarantine live.
# Default: ~/.local/share/splicefeed (XDG data dir).
#data_dir = "/srv/splicefeed"

# Default poll interval for every show (humantime syntax: "30m", "2h", ...).
# Each poll is jittered and rate-limited; per-show overrides below.
#poll_interval = "30m"

# How many episode downloads may run at once, across all shows.
#download_concurrency = 2

# Control socket for `splicefeed status --watch` (NDJSON over unix
# socket, chmod 0600). Default: $XDG_RUNTIME_DIR/splicefeed.sock, or
# <data_dir>/splicefeed.sock when no runtime dir exists (macOS).
#control_socket = "/run/user/1000/splicefeed.sock"

# Telemetry is off by default: nothing leaves the box. The Prometheus
# /metrics route is always served (pull-only). Configure OTLP to push
# metrics to a collector:
#[telemetry.otlp]
#endpoint = "http://collector.lan:4318/v1/metrics"
#interval = "60s"
#[telemetry.otlp.headers]
#authorization = "Bearer ..."

# Only look at each show's newest N episodes when syncing (discovery AND
# download/retry). Unset = the provider's natural listing window (25 for
# DI.FM). Distinct from retention: fetch_last bounds what comes in,
# keep_last/max_gb bound what stays. Per-show override below.
fetch_last = 2

# Global retention. Both limits may be set; the stricter one wins.
# Omit a field for "no limit". Per-show [shows.retention] overrides these.
[retention]
keep_last = 50
#max_gb = 20.0

# DI.FM premium credentials.
[auth.difm]
# Member API key — REQUIRED, and the trickiest part of setup. This is the
# credential the AudioAddict API accepts (episode audio comes back as
# signed, self-authorizing playback URLs); it is NOT the "listen key"
# shown on the di.fm settings page.
#
# To get it:
#   1. Log in to https://www.di.fm in a web browser (premium account).
#   2. View the page source (Ctrl-U / Cmd-Option-U — any logged-in page
#      works).
#   3. Search the source for  api_key  — it appears in the embedded app
#      config JSON as something like  "api_key":"a1b2c3..."
#   4. Copy that value here (or into the DIFM_API_KEY env var, which
#      overrides this file).
#
# Verify it works with:  splicefeed probe <your-show-slug>
# ("audio: OK" means the key is good; the error hints name the key
# they suspect otherwise.)
#api_key = "your-member-api-key"
# Premium listen key — optional. Only used if an audio URL ever resolves
# to a legacy unsigned stream host; the signed playback URLs above don't
# need it. DIFM_LISTEN_KEY env var overrides.
#listen_key = "your-listen-key"
# API base override for sibling AudioAddict networks (RadioTunes,
# JazzRadio, ...); leave unset for DI.FM.
#base_url = "https://api.audioaddict.com/v1/radiotunes/"

# One [[shows]] block per followed show.
[[shows]]
slug = "melodik-revolution"
#provider = "difm"          # default
#title = "Melodik Revolution"       # feed title override
#poll_interval = "1h"               # per-show override
#fetch_last = 3                     # per-show override
#artwork = "/path/to/art.jpg"       # local path or http(s):// URL
#[shows.retention]
#keep_last = 10

[[shows]]
slug = "anything-melodic"
